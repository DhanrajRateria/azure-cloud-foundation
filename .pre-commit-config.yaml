repos:
  # Terraform formatting — enforces consistent style
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0
    hooks:
      - id: terraform_fmt
        name: Terraform Format
        description: Rewrites all Terraform files to canonical format

      - id: terraform_validate
        name: Terraform Validate
        description: Validates all Terraform configuration files

      - id: terraform_tflint
        name: TFLint
        description: Lints Terraform files with tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl

      - id: terraform_docs
        name: Terraform Docs
        description: Auto-generates README for modules
        args:
          - --args=--output-file=README.md
          - --args=--output-mode=inject

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
        name: Detect Private Keys
        description: Prevents accidental commit of private keys
